<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS | Let's Get Started</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">

    <div class="nav-controls">
        <button onclick="history.back()" class="btn-nav dark">
            <i class="fas fa-arrow-left"></i> Go Back
        </button>
        <a href="/" class="btn-nav dark">
            <i class="fas fa-home"></i> Home
        </a>
    </div>

    <div class="auth-card">
        <img src="/logo.png" alt="HMS" style="width:180px; margin-bottom:10px;">
        <h2>Let's Get Started</h2>
        <span class="subtitle">Add Your Personal Details to Continue</span>
        
        <form action="/auth/register" method="POST">
            
            <div class="btn-row">
                <div class="form-group" style="flex:1">
                    <label>First Name:</label>
                    <input type="text" name="fname" placeholder="John" required>
                </div>
                <div class="form-group" style="flex:1">
                    <label>Last Name:</label>
                    <input type="text" name="lname" placeholder="Doe" required>
                </div>
            </div>

            <div class="form-group">
                <label>Address:</label>
                <input type="text" name="address" placeholder="House No, Street, City" required>
            </div>

            <div class="form-group">
                <label>NIC Number:</label>
                <input type="text" name="nic" placeholder="000000000V" required>
            </div>

            <div class="form-group">
                <label>Date of Birth:</label>
                <input type="date" name="dob" required>
            </div>

            <div class="form-group">
                <label>Email Address:</label>
                <input type="email" name="email" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>

            <div class="btn-row" style="margin-top: 20px;">
                <button type="reset" class="btn-reset">Reset</button>
                <button type="submit" class="btn-blue" style="flex:1">Register</button>
            </div>
            
            <p style="margin-top: 20px; font-size: 0.85rem; color: #666;">
                Already have an account? 
                <a href="/login" style="color: #007bff; text-decoration: none; font-weight: 600;">Sign In</a>
            </p>
        </form>
    </div>

    <div class="chat-btn" onclick="toggleChat()">
        <i class="fas fa-robot"></i>
    </div>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <span>HMS AI Assistant</span>
            <i class="fas fa-times" onclick="toggleChat()" style="cursor: pointer; opacity: 0.8;"></i>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="msg bot-msg">Welcome! I can help you complete your registration.</div>
        </div>
        <div class="chat-footer">
            <input type="text" id="chatInput" placeholder="Type your message...">
            <button onclick="handleChat()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="chatbot.js"></script>
    <script>
        function toggleChat() {
            const chat = document.getElementById('chatWindow');
            chat.style.display = (chat.style.display === 'none' || chat.style.display === '') ? 'flex' : 'none';
        }
    </script>

</body>
</html>
